<div class="login">
  <form class="login__card" (ngSubmit)="submit()">
    <div class="login__brand">
      <span class="login__mark">◧</span>
      <div>
        <div class="login__name">Opptra <span>Pricing Optimizer</span></div>
        <div class="login__sub">Sign in to continue</div>
      </div>
    </div>

    <label class="login__field">
      <span>Username</span>
      <input
        type="text"
        name="username"
        autocomplete="username"
        [ngModel]="username()"
        (ngModelChange)="username.set($event)"
        placeholder="admin or analyst"
        required
      />
    </label>

    <label class="login__field">
      <span>Password</span>
      <input
        type="password"
        name="password"
        autocomplete="current-password"
        [ngModel]="password()"
        (ngModelChange)="password.set($event)"
        placeholder="••••••••"
        required
      />
    </label>

    @if (error()) {
      <div class="login__error">{{ error() }}</div>
    }

    <button class="login__submit" type="submit">Sign in</button>

  </form>
</div>
