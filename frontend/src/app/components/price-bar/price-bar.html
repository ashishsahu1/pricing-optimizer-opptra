<div class="bar">
  <!-- danger zone: everything left of the margin floor -->
  <div class="bar__floorzone" [style.width.%]="floorPct()"></div>
  <div class="bar__floorline" [style.left.%]="floorPct()"></div>

  @for (m of markers(); track m.kind) {
    <div class="marker marker--{{ m.kind }}" [style.left.%]="m.pct">
      <div class="marker__dot"></div>
      <div class="marker__tag">
        <span class="marker__label">{{ m.label }}</span>
        <span class="marker__value">{{ m.value | inr }}</span>
      </div>
    </div>
  }
</div>
