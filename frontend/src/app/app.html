<div class="shell">
  <header class="topbar">
    <div class="brand">
      <span class="brand__mark">◧</span>
      <div>
        <div class="brand__name">Opptra <span>Pricing Optimizer</span></div>
        <div class="brand__sub">Competitor price → one-click decision</div>
      </div>
    </div>

    @if (auth.isAuthenticated()) {
      <nav class="nav">
        <a routerLink="/" routerLinkActive="nav__link--active" [routerLinkActiveOptions]="{ exact: true }"
          class="nav__link">Optimizer</a>
        <a routerLink="/story" routerLinkActive="nav__link--active" class="nav__link">Story</a>
      </nav>

      <div class="account">
        <span class="account__user">{{ auth.user() }}</span>
        <button type="button" class="account__logout" (click)="logout()">Sign out</button>
      </div>
    }
  </header>

  <main class="content">
    <router-outlet />
  </main>
</div>
